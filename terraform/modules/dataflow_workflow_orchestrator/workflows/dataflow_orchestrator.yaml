main:
  params: [args]
  steps:
    - init:
        assign:
          - args_map: ${default(args, json.decode("{}"))}
          - action: ${default(map.get(args_map, "action"), "start")}
          - stop_mode: ${default(map.get(args_map, "stop_mode"), "drain")}
          - project_id: ${map.get(args_map, "project_id")}
          - region: ${map.get(args_map, "region")}
          - job_name: ${text.to_lower(map.get(args_map, "job_name"))}
          - zone: ${default(map.get(args_map, "zone"), "")}
          - is_streaming: ${default(map.get(args_map, "is_streaming"), true)}
          - container_image: ${map.get(args_map, "container_image")}
          - launch_parameters: ${default(map.get(args_map, "parameters"), json.decode("{}"))}
          - subnetwork: ${map.get(args_map, "subnetwork")}
          - service_account_email: ${map.get(args_map, "service_account_email")}
          - temp_location: ${map.get(args_map, "temp_location")}
          - staging_location: ${map.get(args_map, "staging_location")}
          - num_workers: ${default(map.get(args_map, "num_workers"), 1)}
          - max_workers: ${default(map.get(args_map, "max_workers"), 2)}
          - ip_configuration: ${default(map.get(args_map, "ip_configuration"), "WORKER_IP_PRIVATE")}
          - enable_streaming_engine: ${default(map.get(args_map, "enable_streaming_engine"), true)}
          - job_is_active: false
          - matched_job_id: ""
          - matched_job_state: ""
          - stop_requested_state: "JOB_STATE_DRAINED"

    - maybe_set_cancel_stop_state:
        switch:
          - condition: ${stop_mode == "cancel"}
            steps:
              - set_cancel_stop_state:
                  assign:
                    - stop_requested_state: "JOB_STATE_CANCELLED"

    - validate_required_inputs:
        switch:
          - condition: ${project_id == null or project_id == ""}
            raise: "Missing required input: project_id"
          - condition: ${region == null or region == ""}
            raise: "Missing required input: region"
          - condition: ${job_name == null or job_name == ""}
            raise: "Missing required input: job_name"

    - validate_action_inputs:
        switch:
          - condition: ${action != "start" and action != "stop"}
            raise: "Invalid input: action must be one of [start, stop]"
          - condition: ${action == "stop" and stop_mode != "drain" and stop_mode != "cancel"}
            raise: "Invalid input: stop_mode must be one of [drain, cancel]"

    - validate_start_inputs:
        switch:
          - condition: ${action != "start"}
            next: list_jobs
          - condition: ${container_image == null or container_image == ""}
            raise: "Missing required input for action=start: container_image"
          - condition: ${subnetwork == null or subnetwork == ""}
            raise: "Missing required input for action=start: subnetwork"
          - condition: ${service_account_email == null or service_account_email == ""}
            raise: "Missing required input for action=start: service_account_email"
          - condition: ${temp_location == null or temp_location == ""}
            raise: "Missing required input for action=start: temp_location"
          - condition: ${staging_location == null or staging_location == ""}
            raise: "Missing required input for action=start: staging_location"

    - list_jobs:
        call: googleapis.dataflow.v1b3.projects.locations.jobs.list
        args:
          projectId: ${project_id}
          location: ${region}
          filter: "ACTIVE"
        result: active_jobs_response

    - extract_jobs:
        assign:
          - active_jobs: ${map.get(active_jobs_response, "jobs")}
          - jobs_list: ${if(active_jobs == null, [], active_jobs)}

    - iterate_jobs:
        for:
          value: job
          in: ${jobs_list}
          steps:
            - evaluate_job:
                switch:
                  - condition: ${matched_job_id == "" and job.name == job_name and (job.currentState == "JOB_STATE_RUNNING" or job.currentState == "JOB_STATE_DRAINING" or job.currentState == "JOB_STATE_PENDING" or job.currentState == "JOB_STATE_QUEUED")}
                    steps:
                      - mark_running:
                          assign:
                            - job_is_active: true
                            - matched_job_id: ${job.id}
                            - matched_job_state: ${job.currentState}

    - route_by_action:
        switch:
          - condition: ${action == "stop"}
            next: maybe_stop
        next: maybe_launch

    - maybe_launch:
        switch:
          - condition: ${job_is_active}
            next: already_running
        next: build_launch_env

    - already_running:
        return:
          status: "already_running"
          action: ${action}
          job_name: ${job_name}
          job_id: ${matched_job_id}
          job_state: ${matched_job_state}
          is_streaming: ${is_streaming}

    - build_launch_env:
        assign:
          - launch_env:
              subnetwork: ${subnetwork}
              serviceAccountEmail: ${service_account_email}
              tempLocation: ${temp_location}
              stagingLocation: ${staging_location}
              numWorkers: ${num_workers}
              maxWorkers: ${max_workers}
              ipConfiguration: ${ip_configuration}
              enableStreamingEngine: ${enable_streaming_engine}

    - maybe_add_zone:
        switch:
          - condition: ${zone != null and zone != ""}
            steps:
              - add_zone_to_env:
                  assign:
                    - launch_env: ${map.set(launch_env, "zone", zone)}

    - launch_job:
        try:
          call: googleapis.dataflow.v1b3.projects.locations.flexTemplates.launch
          args:
            projectId: ${project_id}
            location: ${region}
            body:
              launchParameter:
                jobName: ${job_name}
                containerSpec:
                  image: ${container_image}
                  sdkInfo:
                    language: "JAVA"
                parameters: ${launch_parameters}
                environment: ${launch_env}
          result: launch_response
        except:
          as: launch_error
          steps:
            - maybe_handle_launch_conflict:
                switch:
                  - condition: ${launch_error.code == 409}
                    next: launch_conflict_already_running
            - rethrow_launch_error:
                raise: ${launch_error}

    - launch_conflict_already_running:
        return:
          status: "already_running"
          action: ${action}
          job_name: ${job_name}
          job_id: ${matched_job_id}
          job_state: ${matched_job_state}
          zone: ${zone}
          is_streaming: ${is_streaming}
          reason: "launch_conflict_409"

    - launched:
        return:
          status: "launched"
          action: ${action}
          job_name: ${job_name}
          zone: ${zone}
          is_streaming: ${is_streaming}
          response: ${launch_response}

    - maybe_stop:
        switch:
          - condition: ${job_is_active}
            next: stop_job
        next: already_stopped

    - already_stopped:
        return:
          status: "already_stopped"
          action: ${action}
          job_name: ${job_name}

    - stop_job:
        call: googleapis.dataflow.v1b3.projects.locations.jobs.update
        args:
          projectId: ${project_id}
          location: ${region}
          jobId: ${matched_job_id}
          body:
            requestedState: ${stop_requested_state}
        result: stop_response

    - stop_requested:
        return:
          status: "stop_requested"
          action: ${action}
          stop_mode: ${stop_mode}
          requested_state: ${stop_requested_state}
          job_name: ${job_name}
          job_id: ${matched_job_id}
          response: ${stop_response}
