[[rules]]
id = "project-name-plain-value"
description = "Detects project.name with plain value (not secret reference)"
regex = '''project\.name\s*=\s*([^\s#]+)'''
secretGroup = 1
keywords = ["project.name"]
	[[rules.allowlists]]
	description = "Allow secret references"
	regexes = ['''^\$\{.*\}$''']

