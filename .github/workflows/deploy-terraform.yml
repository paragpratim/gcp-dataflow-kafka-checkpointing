name: Deploy Terraform Infrastructure

on:
  push:
    branches: [ main ]
    paths: 
      - 'terraform/**'
      - '.github/workflows/deploy-terraform.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy-terraform.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  PROJECT_ID: ${{ secrets.DATAFLOW_TEST_PROJECT_ID }}
  REGION: europe-west4
  TF_VAR_project_id: ${{ secrets.DATAFLOW_TEST_PROJECT_ID }}
  TF_VAR_region: europe-west4
  TF_VAR_my_domain: ${{ secrets.MY_DOMAIN }}
  TF_TARGET_MODULE: dataflow

jobs:
  init:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.DEPLOYMENT_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_NAME }}/providers/${{ secrets.WIF_PROVIDER_NAME }}'
          service_account: ${{ secrets.DEPLOYMENT_SVC }}
          audience: ${{ secrets.WIF_AUDIENCE }}
          project_id: ${{ env.PROJECT_ID }}  # Set target project directly in auth
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Terraform Composite Action
        uses: paragpratim/github-actions-pipeline-templates/.github/actions/terraform@main
        with:
          action: ${{ github.event.inputs.action }}
          terraform_version: 1.6.0
          tf_target_module: ${{ env.TF_TARGET_MODULE }}
  terraform:
    uses: paragpratim/github-actions-pipeline-templates/.github/workflows/deploy-terraform-job.yml@main
    with:
      action: ${{ github.event.inputs.action }}
      terraform_version: 1.6.0
      tf_target_module: ${{ env.TF_TARGET_MODULE }}