name: Deploy Dataflow Flex Template

on:
  push:
    branches: [ main ]
    paths: 
      - 'terraform/modules/dataflow-flex/**'
      - '.github/workflows/deploy-dataflow-flex.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/modules/dataflow-flex/**'
      - '.github/workflows/deploy-dataflow-flex.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  GOOGLE_CLOUD_QUOTA_PROJECT: dataflow-test-290e

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
