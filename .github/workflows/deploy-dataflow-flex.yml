name: Deploy Dataflow Flex Template

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.DATAFLOW_TEST_PROJECT_ID }} # Required for Dataflow flex jobs
  PROJECT_ID: ${{ secrets.DATAFLOW_TEST_PROJECT_ID }}
  REGION: europe-west4
  TF_VAR_project_id: ${{ secrets.DATAFLOW_TEST_PROJECT_ID }}
  TF_VAR_region: europe-west4
  TF_VAR_my_domain: ${{ secrets.MY_DOMAIN }}
  TF_VAR_submit_dataflow_flex_job: true
  TF_TARGET_MODULE: dataflow_flex_streaming

jobs:
  deploy_dataflow_flex_job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.DEPLOYMENT_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_NAME }}/providers/${{ secrets.WIF_PROVIDER_NAME }}'
          service_account: ${{ secrets.DEPLOYMENT_SVC }}
          audience: ${{ secrets.WIF_AUDIENCE }}
          project_id: ${{ env.PROJECT_ID }}  # Set target project directly in auth

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Initialize Terraform and Validate
        uses: paragpratim/github-actions-pipeline-templates/.github/actions/terraform-validate@main
        with:
          terraform_version: 1.6.0

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set +e  # Don't exit on error
          terraform plan -target="module.${TF_TARGET_MODULE}" -detailed-exitcode -no-color -out=tfplan
          PLAN_EXIT_CODE=$?
          echo "exitcode=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Only fail if exit code is 1 (actual error)
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "❌ Terraform plan failed"
            exit 1
          fi
          
          # Exit codes 0 (no changes) and 2 (changes detected) are success
          echo "✅ Terraform plan completed with exit code: $PLAN_EXIT_CODE"

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const exitCode = `${{ steps.plan.outputs.exitcode }}`;
            
            let status = '';
            if (exitCode === '0') {
              status = '✅ No changes detected';
            } else if (exitCode === '2') {
              status = '📋 Changes detected';
            } else {
              status = '❌ Plan failed';
            }
            
            const output = `## Terraform Plan Results ${status}
            
            <details><summary>Show Plan Output</summary>
            
            \`\`\`terraform
            ${plan}
            \`\`\`
            
            </details>
            
            *Plan Exit Code: ${exitCode}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: |
          github.ref == 'refs/heads/main' && 
          (github.event_name == 'push' || 
           (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')) &&
          steps.plan.outputs.exitcode == '2'
        working-directory: terraform
        run: |
          terraform apply -target="module.${TF_TARGET_MODULE}" -auto-approve tfplan
          echo "Infrastructure deployed successfully!"

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        working-directory: terraform
        run: |
          terraform destroy -target="module.${TF_TARGET_MODULE}" -auto-approve
          echo "Infrastructure destroyed successfully!"

      - name: Output Infrastructure Info
        if: |
          github.ref == 'refs/heads/main' && 
          (github.event_name == 'push' || 
           (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
        working-directory: terraform
        run: |
          echo "## Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Target Project:** ${{ env.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Flex Template Spec GCS Path:** $(terraform output -raw flex_template_spec_gcs_path 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Dataflow Job Name:** $(terraform output -raw dataflow_job_name 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Dataflow Job ID:** $(terraform output -raw dataflow_job_id 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Dataflow Job State:** $(terraform output -raw dataflow_job_state 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
